server {
    listen 80;
    server_name _;

    # Root directory pointing to your git repository checkout on EC2
    root /var/www/aws-ecommerce-Application-Multiple-services/frontend;
    index main/index.html;

    # Core Frontend Dashboard Root
    location / {
        try_files /main/$uri /main/index.html =404;
    }

    # Route maps for your individual sub-modules from image_c3b686.png
    location /computers/ {
        try_files $uri $uri/ /computers/index.html;
    }

    location /electronics/ {
        try_files $uri $uri/ /electronics/index.html;
    }

    location /googlegrocery/ {
        try_files $uri $uri/ /googlegrocery/index.html;
    }

    location /googlepay/ {
        try_files $uri $uri/ /googlepay/index.html;
    }

    # API Proxy configuration routing traffic directly to the Flask Backend
    location /api/ {
        proxy_pass http://127.0.0.1:5000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}